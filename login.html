<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Publications Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://qsagqcouijcwnvsxlkmj.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFzYWdxY291aWpjd252c3hsa21qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMjMxMDQsImV4cCI6MjA5MTY5OTEwNH0.rjmDJziRnbsZoRw_foVSgEuD-zRAQAj-Ldv1bDiVPqY';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  </script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-md p-10 w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-slate-800">Publications Tracker</h1>
      <p class="text-slate-500 mt-2 text-sm">Enter your email to receive a sign-in link. No password needed.</p>
    </div>
    <div id="form-section">
      <label class="block text-sm font-medium text-slate-700 mb-1" for="email">Email address</label>
      <input id="email" type="email" placeholder="you@example.com"
        class="w-full border border-slate-300 rounded-lg px-4 py-2.5 text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-500 mb-4" />
      <button id="send-btn" onclick="sendMagicLink()"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg transition">
        Send sign-in link
      </button>
      <p id="error-msg" class="text-red-500 text-sm mt-3 hidden"></p>
    </div>
    <div id="success-section" class="hidden text-center">
      <div class="text-4xl mb-4">📬</div>
      <h2 class="text-lg font-semibold text-slate-800 mb-2">Check your inbox!</h2>
      <p class="text-slate-500 text-sm">
        We sent a sign-in link to <strong id="sent-to"></strong>.<br/>
        Click the link in the email to continue.
      </p>
      <button onclick="resetForm()" class="mt-6 text-sm text-blue-600 hover:underline">Use a different email</button>
    </div>
  </div>
  <script>
    (async () => {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session) window.location.href = 'publications.html';
    })();

    async function sendMagicLink() {
      const email = document.getElementById('email').value.trim();
      const errorEl = document.getElementById('error-msg');
      const btn = document.getElementById('send-btn');
      errorEl.classList.add('hidden');
      if (!email || !email.includes('@')) {
        errorEl.textContent = 'Please enter a valid email address.';
        errorEl.classList.remove('hidden');
        return;
      }
      btn.textContent = 'Sending…';
      btn.disabled = true;
      const { error } = await supabaseClient.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: window.location.origin + '/publications.html' },
      });
      if (error) {
        errorEl.textContent = error.message;
        errorEl.classList.remove('hidden');
        btn.textContent = 'Send sign-in link';
        btn.disabled = false;
        return;
      }
      document.getElementById('sent-to').textContent = email;
      document.getElementById('form-section').classList.add('hidden');
      document.getElementById('success-section').classList.remove('hidden');
    }

    function resetForm() {
      document.getElementById('email').value = '';
      document.getElementById('form-section').classList.remove('hidden');
      document.getElementById('success-section').classList.add('hidden');
      document.getElementById('send-btn').textContent = 'Send sign-in link';
      document.getElementById('send-btn').disabled = false;
    }
  </script>
</body>
</html>
